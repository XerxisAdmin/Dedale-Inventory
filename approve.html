<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purchase Order — Dedale Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--navy:#141628;--navy-mid:#1a1d38;--surface:#222646;--border:#383d72;--crimson:#cc2244;--crimson-dark:#881630;--gold:#d4a830;--green:#22cc88;--text:#e4e8ff;--text2:#9aa2cc;--text3:#565e90;}
body{font-family:'Rajdhani',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background-image:repeating-linear-gradient(0deg,rgba(26,42,58,0.3) 0px,rgba(26,42,58,0.3) 1px,transparent 1px,transparent 40px),repeating-linear-gradient(90deg,rgba(26,42,58,0.3) 0px,rgba(26,42,58,0.3) 1px,transparent 1px,transparent 40px);}
.card{background:var(--surface);border:1px solid var(--border);width:100%;max-width:520px;clip-path:polygon(0 0,calc(100% - 18px) 0,100% 18px,100% 100%,18px 100%,0 calc(100% - 18px));position:relative;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--crimson),var(--gold) 60%,transparent);z-index:1;}
.header{padding:22px 28px 18px;border-bottom:1px solid var(--border);}
.company{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:#fff;letter-spacing:2px;}
.system{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--crimson);letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
.header-right{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;}
.body{padding:32px 28px;}
.icon-wrap{width:56px;height:56px;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));display:flex;align-items:center;justify-content:center;margin:0 auto 18px;}
.icon-wrap.success{background:rgba(34,204,136,0.15);}
.icon-wrap.error{background:rgba(196,18,48,0.15);}
.icon-wrap.pending{background:rgba(86,94,144,0.2);}
.title{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;color:#fff;text-align:center;margin-bottom:8px;letter-spacing:1px;}
.subtitle{font-family:'Rajdhani',sans-serif;font-size:14px;color:var(--text2);text-align:center;margin-bottom:22px;line-height:1.6;}
.po-box{background:var(--navy-mid);border:1px solid var(--border);padding:14px 18px;margin-bottom:20px;}
.po-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(56,61,114,0.5);font-size:13px;}
.po-row:last-child{border-bottom:none;padding-bottom:0;}
.po-label{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;}
.po-value{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;color:var(--text);}
.btn{display:block;width:100%;padding:12px;text-align:center;font-family:'Orbitron',monospace;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;border:none;cursor:pointer;text-decoration:none;margin-bottom:8px;clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px));}
.btn-home{background:transparent;color:var(--text3);border:1px solid var(--border);clip-path:none;font-size:10px;}
.btn-home:hover{color:var(--text2);border-color:var(--border);}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--crimson);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 18px;}
@keyframes spin{to{transform:rotate(360deg)}}
.badge{display:inline-block;padding:3px 10px;font-family:'Share Tech Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1.5px;clip-path:polygon(5px 0,100% 0,calc(100% - 5px) 100%,0 100%);}
.badge-approved{background:rgba(34,204,136,0.15);color:var(--green);}
.badge-rejected{background:rgba(196,18,48,0.15);color:var(--crimson);}
.footer{padding:12px 28px;border-top:1px solid var(--border);display:flex;justify-content:space-between;}
.footer span{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1px;}
</style>
</head>
<body>
<div class="card">
  <div class="header" style="display:flex;justify-content:space-between;align-items:flex-start;">
    <div>
      <div class="company">DEDALE INTELLIGENCE</div>
      <div class="system">INTEL-SYS // Purchase Request</div>
    </div>
    <div class="header-right">Approval Portal</div>
  </div>
  <div class="body" id="main-body">
    <div class="spinner"></div>
    <div class="title">Processing...</div>
    <div class="subtitle">Please wait while we update the purchase request.</div>
  </div>
  <div class="footer">
    <span>INTEL-SYS v1.0</span>
    <span>Dedale Intelligence</span>
  </div>
</div>

<script>
const CLIENT_ID='4cda57d2-0ef7-4ed4-b683-91d59c94ff86';
const TENANT_ID='115d6eac-9c52-4e39-9c4c-f8d77ede8a9d';
const FILE_NAME='dedale-inventory-data.json';
const SCOPES=['Files.ReadWrite','User.Read'];

const params=new URLSearchParams(window.location.search);
const poId=params.get('id');
const action=params.get('action');

function showState(type,title,subtitle,extra){
  const icons={
    success:'<svg width="26" height="26" fill="none" stroke="#22cc88" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20,6 9,17 4,12"/></svg>',
    error:'<svg width="26" height="26" fill="none" stroke="#cc2244" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
    pending:'<svg width="26" height="26" fill="none" stroke="#565e90" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>'
  };
  document.getElementById('main-body').innerHTML=
    '<div class="icon-wrap '+type+'">'+icons[type]+'</div>'
    +'<div class="title">'+title+'</div>'
    +'<div class="subtitle">'+subtitle+'</div>'
    +(extra||'')
    +'<a href="https://xerxisadmin.github.io/Dedale-Inventory/" class="btn btn-home">\u2190 Back to INTEL-SYS</a>';
}

async function loadData(accessToken){
  try{
    const r=await fetch('https://graph.microsoft.com/v1.0/me/drive/root:/'+FILE_NAME+':/content',
      {headers:{'Authorization':'Bearer '+accessToken}});
    if(r.ok)return{data:await r.json(),endpoint:'me/drive/root:/'+FILE_NAME+':/content'};
  }catch(e){}

  try{
    const sr=await fetch('https://graph.microsoft.com/v1.0/me/drive/sharedWithMe',
      {headers:{'Authorization':'Bearer '+accessToken}});
    if(sr.ok){
      const shared=await sr.json();
      const file=(shared.value||[]).find(function(f){return f.name===FILE_NAME;});
      if(file){
        const driveId=file.remoteItem?file.remoteItem.parentReference.driveId:file.parentReference.driveId;
        const itemId=file.remoteItem?file.remoteItem.id:file.id;
        const r2=await fetch('https://graph.microsoft.com/v1.0/drives/'+driveId+'/items/'+itemId+'/content',
          {headers:{'Authorization':'Bearer '+accessToken}});
        if(r2.ok)return{data:await r2.json(),endpoint:'drives/'+driveId+'/items/'+itemId+'/content'};
      }
    }
  }catch(e){}

  return null;
}

async function saveData(accessToken,endpoint,data){
  const r=await fetch('https://graph.microsoft.com/v1.0/'+endpoint,
    {method:'PUT',headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},
     body:JSON.stringify(data,null,2)});
  return r.ok;
}

async function run(){
  if(!poId||!action){
    showState('error','Invalid Link','This approval link is missing required information.<br>Please use the link from the email.');
    return;
  }

  let msalInstance,accessToken;
  try{
    msalInstance=new msal.PublicClientApplication({
      auth:{clientId:CLIENT_ID,authority:'https://login.microsoftonline.com/'+TENANT_ID,
        redirectUri:'https://xerxisadmin.github.io/Dedale-Inventory/approve.html',
        navigateToLoginRequestUrl:false},
      cache:{cacheLocation:'localStorage',storeAuthStateInCookie:true},
      system:{allowNativeBroker:false}
    });
    await msalInstance.initialize();
  }catch(e){showState('error','Auth Error','Could not initialize sign-in. Please try again.');return;}

  try{const resp=await msalInstance.handleRedirectPromise();if(resp&&resp.accessToken)accessToken=resp.accessToken;}catch(e){}

  if(!accessToken){
    const accounts=msalInstance.getAllAccounts();
    if(accounts.length>0){
      try{const r=await msalInstance.acquireTokenSilent({scopes:SCOPES,account:accounts[0]});if(r&&r.accessToken)accessToken=r.accessToken;}catch(e){}
    }
  }

  if(!accessToken){
    try{await msalInstance.loginRedirect({scopes:SCOPES,prompt:'select_account'});}
    catch(e){showState('error','Sign-in Required','Please sign in with your Dedale Microsoft account.');}
    return;
  }

  const result=await loadData(accessToken);
  if(!result){
    showState('error','Could Not Load Data',
      'Unable to find the inventory data file.<br><br>'
      +'<span style="font-family:\'Share Tech Mono\',monospace;font-size:11px;color:#565e90;">Ask Xerxis to share <strong style="color:#9aa2cc;">'+FILE_NAME+'</strong> from his OneDrive with your Dedale account (edit access), then try again.</span>');
    return;
  }

  const{data,endpoint}=result;
  const pos=data.purchaseOrders||[];
  const poIdx=pos.findIndex(function(p){return p.id===poId;});
  if(poIdx===-1){showState('error','Not Found','This purchase request could not be found. It may have been deleted.');return;}
  const po=pos[poIdx];

  if(po.status==='Approved'||po.status==='Rejected'){
    const badge=po.status==='Approved'
      ?'<span class="badge badge-approved">APPROVED</span>'
      :'<span class="badge badge-rejected">REJECTED</span>';
    showState('pending','Already Processed',
      'This request was already '+po.status.toLowerCase()+'.',
      '<div class="po-box">'
        +'<div class="po-row"><span class="po-label">Request</span><span class="po-value">'+po.title+'</span></div>'
        +'<div class="po-row"><span class="po-label">Requested By</span><span class="po-value">'+po.requester+'</span></div>'
        +'<div class="po-row"><span class="po-label">Status</span><span class="po-value">'+badge+'</span></div>'
        +'</div>');
    return;
  }

  const status=action==='approve'?'Approved':'Rejected';
  data.purchaseOrders[poIdx].status=status;
  data.purchaseOrders[poIdx].processedAt=new Date().toISOString();

  const saved=await saveData(accessToken,endpoint,data);
  if(!saved){showState('error','Save Failed','The status could not be saved. Please try again.');return;}

  const isApproved=status==='Approved';
  const badge=isApproved
    ?'<span class="badge badge-approved">APPROVED</span>'
    :'<span class="badge badge-rejected">REJECTED</span>';
  showState(
    isApproved?'success':'error',
    isApproved?'Request Approved':'Request Rejected',
    isApproved?'The purchase request has been approved and saved.':'The purchase request has been rejected and saved.',
    '<div class="po-box">'
      +'<div class="po-row"><span class="po-label">Request</span><span class="po-value">'+po.title+'</span></div>'
      +'<div class="po-row"><span class="po-label">Requested By</span><span class="po-value">'+po.requester+'</span></div>'
      +'<div class="po-row"><span class="po-label">Total</span><span class="po-value">\u20b1'+(po.total||0).toLocaleString()+'</span></div>'
      +'<div class="po-row"><span class="po-label">Status</span><span class="po-value">'+badge+'</span></div>'
      +'</div>');
}

run();
</script>
</body>
</html>
