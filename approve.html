<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dedale — Purchase Order Approval</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Rajdhani',sans-serif;background:#0e0f1a;color:#e4e8ff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background-image:repeating-linear-gradient(0deg,rgba(26,42,58,0.3) 0px,rgba(26,42,58,0.3) 1px,transparent 1px,transparent 40px),repeating-linear-gradient(90deg,rgba(26,42,58,0.3) 0px,rgba(26,42,58,0.3) 1px,transparent 1px,transparent 40px);}
.card{background:#1a1d38;border:1px solid #383d72;padding:36px 40px;width:560px;max-width:95vw;position:relative;clip-path:polygon(0 0,calc(100% - 18px) 0,100% 18px,100% 100%,18px 100%,0 calc(100% - 18px));}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#cc2244,#d4a830 66%,transparent);}
.logo{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;color:#fff;letter-spacing:3px;margin-bottom:4px;}
.sub{font-family:'Share Tech Mono',monospace;font-size:9px;color:#cc2244;letter-spacing:3px;margin-bottom:28px;}
.label{font-family:'Share Tech Mono',monospace;font-size:10px;color:#d4a830;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
.value{font-size:16px;font-weight:600;color:#e4e8ff;margin-bottom:16px;}
.divider{height:1px;background:#383d72;margin:20px 0;}
table{width:100%;border-collapse:collapse;margin-bottom:16px;}
thead th{padding:8px 12px;text-align:left;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:#d4a830;background:#222646;border-bottom:1px solid #383d72;font-family:'Share Tech Mono',monospace;}
tbody td{padding:8px 12px;border-bottom:1px solid #2a2e58;font-size:14px;color:#e4e8ff;}
.total{text-align:right;font-family:'Share Tech Mono',monospace;font-size:16px;font-weight:700;color:#d4a830;margin-bottom:24px;}
.btn-row{display:flex;gap:12px;justify-content:center;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 32px;font-family:'Orbitron',monospace;font-size:10px;font-weight:600;letter-spacing:2px;cursor:pointer;border:none;transition:all 0.15s;text-transform:uppercase;}
.btn-approve{background:linear-gradient(135deg,#0f6b38,#15803d);color:#fff;clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px));}
.btn-approve:hover{background:linear-gradient(135deg,#15803d,#22c55e);}
.btn-reject{background:linear-gradient(135deg,#881630,#cc2244);color:#fff;clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px));}
.btn-reject:hover{background:linear-gradient(135deg,#cc2244,#ff2255);}
#status-msg{display:none;margin-top:20px;padding:14px 18px;font-family:'Share Tech Mono',monospace;font-size:13px;text-align:center;}
.msg-success{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.4);color:#22c55e;}
.msg-error{background:rgba(204,34,68,0.1);border:1px solid rgba(204,34,68,0.4);color:#cc2244;}
#loading{text-align:center;padding:40px;font-family:'Share Tech Mono',monospace;font-size:12px;color:#9aa2cc;letter-spacing:2px;}
#po-content{display:none;}
#login-section{display:none;text-align:center;padding:20px 0;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">DEDALE INTELLIGENCE</div>
  <div class="sub">PURCHASE ORDER APPROVAL</div>
  <div id="loading">AUTHENTICATING...</div>
  <div id="login-section">
    <p style="font-size:14px;color:#9aa2cc;margin-bottom:20px">Sign in with your Dedale Microsoft account to approve or reject this purchase request.</p>
    <button onclick="signIn()" style="padding:13px 28px;background:linear-gradient(135deg,#881630,#cc2244);color:#fff;border:none;font-family:'Orbitron',monospace;font-size:10px;font-weight:600;letter-spacing:2px;cursor:pointer;display:inline-flex;align-items:center;gap:10px">
      <svg width="18" height="18" viewBox="0 0 21 21" fill="none"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
      SIGN IN WITH MICROSOFT
    </button>
  </div>
  <div id="po-content">
    <div class="label">Requested By</div><div class="value" id="po-requester"></div>
    <div class="label">Justification</div><div class="value" id="po-justification"></div>
    <div class="label">For Employee</div><div class="value" id="po-employee"></div>
    <div class="label">Urgency</div><div class="value" id="po-urgency"></div>
    <div class="divider"></div>
    <table><thead><tr><th>Description</th><th>Type</th><th>Qty</th><th>Unit Price</th><th>Subtotal</th></tr></thead><tbody id="po-items"></tbody></table>
    <div class="total">TOTAL: <span id="po-total"></span></div>
    <div class="btn-row">
      <button class="btn btn-approve" onclick="updateStatus('Approved')">✓ APPROVE</button>
      <button class="btn btn-reject" onclick="updateStatus('Rejected')">✗ REJECT</button>
    </div>
    <div id="status-msg"></div>
  </div>
</div>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<script>
const CLIENT_ID='4cda57d2-0ef7-4ed4-b683-91d59c94ff86';
const TENANT_ID='115d6eac-9c52-4e39-9c4c-f8d77ede8a9d';
const FILE_NAME='dedale-inventory-data.json';
let msalInstance=null,accessToken=null,poData=null,poId=null;

const params=new URLSearchParams(window.location.search);
poId=params.get('id');
const action=params.get('action');

async function init(){
  msalInstance=new msal.PublicClientApplication({
    auth:{clientId:CLIENT_ID,authority:'https://login.microsoftonline.com/'+TENANT_ID,redirectUri:'https://xerxisadmin.github.io/Dedale-Inventory/approve.html'},
    cache:{cacheLocation:'localStorage',storeAuthStateInCookie:true}
  });
  await msalInstance.initialize();
  let response=null;
  try{response=await msalInstance.handleRedirectPromise();}catch(e){}
  if(response&&response.accessToken){accessToken=response.accessToken;await loadAndShow();}
  else{
    const accounts=msalInstance.getAllAccounts();
    if(accounts.length>0){
      try{const r=await msalInstance.acquireTokenSilent({scopes:['Files.ReadWrite'],account:accounts[0]});accessToken=r.accessToken;await loadAndShow();}
      catch(e){showLogin();}
    }else showLogin();
  }
}
function showLogin(){document.getElementById('loading').style.display='none';document.getElementById('login-section').style.display='block';}
async function signIn(){await msalInstance.loginRedirect({scopes:['Files.ReadWrite'],prompt:'select_account'});}

async function loadAndShow(){
  try{
    const r=await fetch('https://graph.microsoft.com/v1.0/me/drive/root:/'+FILE_NAME+':/content',{headers:{'Authorization':'Bearer '+accessToken}});
    const data=await r.json();
    const po=data.purchaseOrders&&data.purchaseOrders.find(p=>p.id===poId);
    if(!po){showError('Purchase request not found.');return;}
    poData={data,po};
    document.getElementById('po-requester').textContent=po.requester||'—';
    document.getElementById('po-justification').textContent=po.justification||'—';
    document.getElementById('po-employee').textContent=po.forEmployee||'N/A';
    document.getElementById('po-urgency').textContent=po.urgency||'—';
    document.getElementById('po-total').textContent='₱'+(po.total||0).toLocaleString();
    document.getElementById('po-items').innerHTML=(po.items||[]).map(i=>'<tr><td>'+i.desc+'</td><td style="font-family:\'Share Tech Mono\',monospace;font-size:11px">'+i.type+'</td><td style="font-family:\'Share Tech Mono\',monospace">'+i.qty+'</td><td style="font-family:\'Share Tech Mono\',monospace">₱'+i.price.toLocaleString()+'</td><td style="font-family:\'Share Tech Mono\',monospace;font-weight:600">₱'+(i.qty*i.price).toLocaleString()+'</td></tr>').join('');
    document.getElementById('loading').style.display='none';
    document.getElementById('po-content').style.display='block';
    if(po.status!=='Pending'){showMsg('This request has already been '+po.status.toLowerCase()+'.',false);document.querySelector('.btn-row').style.display='none';}
    else if(action==='approve')updateStatus('Approved');
    else if(action==='reject')updateStatus('Rejected');
  }catch(e){showError('Failed to load purchase request.');}
}
async function updateStatus(status){
  if(!poData)return;
  try{
    const idx=poData.data.purchaseOrders.findIndex(p=>p.id===poId);
    if(idx===-1){showError('Purchase request not found.');return;}
    poData.data.purchaseOrders[idx].status=status;
    poData.data.purchaseOrders[idx].reviewedAt=new Date().toISOString();
    const r=await fetch('https://graph.microsoft.com/v1.0/me/drive/root:/'+FILE_NAME+':/content',{method:'PUT',headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify(poData.data)});
    if(r.ok){showMsg('Purchase request successfully '+status.toLowerCase()+'.',true);document.querySelector('.btn-row').style.display='none';}
    else showError('Failed to save. Please try again.');
  }catch(e){showError('An error occurred. Please try again.');}
}
function showMsg(msg,success){const el=document.getElementById('status-msg');el.textContent=msg;el.className='msg-'+(success?'success':'error');el.style.display='block';}
function showError(msg){document.getElementById('loading').style.display='none';showMsg(msg,false);}
window.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
