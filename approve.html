<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purchase Order — Dedale Intelligence</title>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#f4f4f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:#fff;border-radius:2px;border:1px solid #e4e4e7;width:100%;max-width:520px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.accent{background:#cc2244;height:4px;}
.header{padding:20px 28px 18px;border-bottom:1px solid #f0f0f0;}
.header-top{display:flex;justify-content:space-between;align-items:center;}
.company{font-size:13px;font-weight:700;color:#18181b;letter-spacing:1px;}
.system{font-size:11px;color:#a1a1aa;margin-top:2px;}
.body{padding:28px;}
.icon-wrap{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.icon-wrap.success{background:#dcfce7;}
.icon-wrap.error{background:#fee2e2;}
.icon-wrap.pending{background:#f1f5f9;}
.title{font-size:18px;font-weight:700;color:#09090b;text-align:center;margin-bottom:6px;}
.subtitle{font-size:13px;color:#71717a;text-align:center;margin-bottom:20px;line-height:1.5;}
.po-box{background:#fafafa;border:1px solid #e4e4e7;padding:14px 18px;border-radius:2px;margin-bottom:20px;}
.po-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:13px;}
.po-row:last-child{border-bottom:none;padding-bottom:0;}
.po-label{color:#71717a;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;}
.po-value{color:#09090b;font-weight:600;}
.btn{display:block;width:100%;padding:12px;text-align:center;font-size:13px;font-weight:700;font-family:Arial,sans-serif;letter-spacing:0.5px;border:none;border-radius:2px;cursor:pointer;text-decoration:none;margin-bottom:8px;}
.btn-home{background:#f4f4f5;color:#374151;font-size:12px;}
.spinner{width:32px;height:32px;border:3px solid #e4e4e7;border-top-color:#cc2244;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:0.5px;}
.badge-approved{background:#dcfce7;color:#16a34a;}
.badge-rejected{background:#fee2e2;color:#dc2626;}
.footer{padding:12px 28px;border-top:1px solid #f0f0f0;display:flex;justify-content:space-between;}
.footer span{font-size:11px;color:#a1a1aa;}
</style>
</head>
<body>
<div class="card">
  <div class="accent"></div>
  <div class="header">
    <div class="header-top">
      <div>
        <div class="company">DEDALE INTELLIGENCE</div>
        <div class="system">IT Asset Management System</div>
      </div>
      <div style="font-size:11px;color:#a1a1aa;">Purchase Request</div>
    </div>
  </div>
  <div class="body" id="main-body">
    <div class="spinner"></div>
    <div class="title">Processing...</div>
    <div class="subtitle">Please wait while we update the purchase request.</div>
  </div>
  <div class="footer">
    <span>INTEL-SYS v1.0</span>
    <span>Dedale Intelligence</span>
  </div>
</div>

<script>
const CLIENT_ID='4cda57d2-0ef7-4ed4-b683-91d59c94ff86';
const TENANT_ID='115d6eac-9c52-4e39-9c4c-f8d77ede8a9d';
const FILE_NAME='dedale-inventory-data.json';
const FILE_OWNER='xerxis.dalanon@dedale.com';
const SCOPES=['Files.ReadWrite','Files.ReadWrite.All','User.Read'];

const params=new URLSearchParams(window.location.search);
const poId=params.get('id');
const action=params.get('action');

function showState(type,title,subtitle,extra){
  const icons={
    success:'<svg width="28" height="28" fill="none" stroke="#16a34a" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20,6 9,17 4,12"/></svg>',
    error:'<svg width="28" height="28" fill="none" stroke="#dc2626" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
    pending:'<svg width="28" height="28" fill="none" stroke="#71717a" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>'
  };
  document.getElementById('main-body').innerHTML=
    '<div class="icon-wrap '+type+'">'+icons[type]+'</div>'
    +'<div class="title">'+title+'</div>'
    +'<div class="subtitle">'+subtitle+'</div>'
    +(extra||'')
    +'<a href="https://xerxisadmin.github.io/Dedale-Inventory/" class="btn btn-home">\u2190 Back to INTEL-SYS</a>';
}

/* Try multiple endpoints to load the data file */
async function loadData(accessToken){
  /* 1. Try owner's drive directly (works if token has Files.ReadWrite.All) */
  try{
    const r=await fetch(
      'https://graph.microsoft.com/v1.0/users/'+FILE_OWNER+'/drive/root:/'+FILE_NAME+':/content',
      {headers:{'Authorization':'Bearer '+accessToken}});
    if(r.ok){
      const data=await r.json();
      return{data,endpoint:'users/'+FILE_OWNER+'/drive/root:/'+FILE_NAME+':/content'};
    }
  }catch(e){}

  /* 2. Try me/drive (works if approver IS the owner) */
  try{
    const r=await fetch(
      'https://graph.microsoft.com/v1.0/me/drive/root:/'+FILE_NAME+':/content',
      {headers:{'Authorization':'Bearer '+accessToken}});
    if(r.ok){
      const data=await r.json();
      return{data,endpoint:'me/drive/root:/'+FILE_NAME+':/content'};
    }
  }catch(e){}

  /* 3. Try sharedWithMe (works if owner shared the file with approver) */
  try{
    const sr=await fetch(
      'https://graph.microsoft.com/v1.0/me/drive/sharedWithMe',
      {headers:{'Authorization':'Bearer '+accessToken}});
    if(sr.ok){
      const shared=await sr.json();
      const file=(shared.value||[]).find(function(f){return f.name===FILE_NAME;});
      if(file){
        const driveId=file.remoteItem?file.remoteItem.parentReference.driveId:file.parentReference.driveId;
        const itemId=file.remoteItem?file.remoteItem.id:file.id;
        const r2=await fetch(
          'https://graph.microsoft.com/v1.0/drives/'+driveId+'/items/'+itemId+'/content',
          {headers:{'Authorization':'Bearer '+accessToken}});
        if(r2.ok){
          const data=await r2.json();
          return{data,endpoint:'drives/'+driveId+'/items/'+itemId+'/content'};
        }
      }
    }
  }catch(e){}

  return null;
}

async function saveData(accessToken,endpoint,data){
  const r=await fetch('https://graph.microsoft.com/v1.0/'+endpoint,
    {method:'PUT',headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},
     body:JSON.stringify(data,null,2)});
  return r.ok;
}

async function run(){
  if(!poId||!action){
    showState('error','Invalid Link','This approval link is missing required information. Please use the link from the email.');
    return;
  }
  if(action!=='approve'&&action!=='reject'){
    showState('error','Invalid Action','The action in this link is not recognized.');
    return;
  }

  let msalInstance,accessToken;
  try{
    msalInstance=new msal.PublicClientApplication({
      auth:{clientId:CLIENT_ID,
        authority:'https://login.microsoftonline.com/'+TENANT_ID,
        redirectUri:'https://xerxisadmin.github.io/Dedale-Inventory/approve.html',
        navigateToLoginRequestUrl:false},
      cache:{cacheLocation:'localStorage',storeAuthStateInCookie:true},
      system:{allowNativeBroker:false}
    });
    await msalInstance.initialize();
  }catch(e){
    showState('error','Authentication Error','Could not initialize sign-in. Please try again.');
    return;
  }

  /* Handle redirect */
  try{
    const resp=await msalInstance.handleRedirectPromise();
    if(resp&&resp.accessToken)accessToken=resp.accessToken;
  }catch(e){}

  /* Try silent token */
  if(!accessToken){
    const accounts=msalInstance.getAllAccounts();
    if(accounts.length>0){
      try{
        const r=await msalInstance.acquireTokenSilent({scopes:SCOPES,account:accounts[0]});
        if(r&&r.accessToken)accessToken=r.accessToken;
      }catch(e){}
    }
  }

  /* Redirect to login if no token */
  if(!accessToken){
    try{
      await msalInstance.loginRedirect({scopes:SCOPES,prompt:'select_account'});
    }catch(e){
      showState('error','Sign-in Required','Please sign in with your Dedale Microsoft account to process this request.');
    }
    return;
  }

  /* Load data */
  const result=await loadData(accessToken);
  if(!result){
    showState('error','Could Not Load Data',
      'Unable to find the inventory data file.<br><br>'
      +'<span style="font-size:12px;color:#6b7280;">Ask <strong>Xerxis</strong> to share the file '
      +'<code style="background:#f4f4f5;padding:2px 6px;border-radius:2px;">'+FILE_NAME+'</code> '
      +'from his OneDrive with your Dedale account (edit access), then try again.</span>');
    return;
  }

  const{data,endpoint}=result;

  /* Find PO */
  const pos=data.purchaseOrders||[];
  const poIdx=pos.findIndex(function(p){return p.id===poId;});
  if(poIdx===-1){
    showState('error','Request Not Found','This purchase request could not be found. It may have been deleted.');
    return;
  }
  const po=pos[poIdx];

  /* Already processed? */
  if(po.status==='Approved'||po.status==='Rejected'){
    const badge=po.status==='Approved'
      ?'<span class="badge badge-approved">APPROVED</span>'
      :'<span class="badge badge-rejected">REJECTED</span>';
    showState('pending','Already Processed',
      'This purchase request was already '+po.status.toLowerCase()+'.',
      '<div class="po-box">'
        +'<div class="po-row"><span class="po-label">Request</span><span class="po-value">'+po.title+'</span></div>'
        +'<div class="po-row"><span class="po-label">Requested By</span><span class="po-value">'+po.requester+'</span></div>'
        +'<div class="po-row"><span class="po-label">Status</span><span class="po-value">'+badge+'</span></div>'
        +'</div>');
    return;
  }

  /* Update status */
  const status=action==='approve'?'Approved':'Rejected';
  data.purchaseOrders[poIdx].status=status;
  data.purchaseOrders[poIdx].processedAt=new Date().toISOString();

  /* Save */
  const saved=await saveData(accessToken,endpoint,data);
  if(!saved){
    showState('error','Could Not Save','The status was updated but failed to save. Please try again.');
    return;
  }

  /* Success */
  const isApproved=status==='Approved';
  const badge=isApproved
    ?'<span class="badge badge-approved">APPROVED</span>'
    :'<span class="badge badge-rejected">REJECTED</span>';
  showState(
    isApproved?'success':'error',
    isApproved?'Request Approved':'Request Rejected',
    isApproved
      ?'The purchase request has been approved and saved successfully.'
      :'The purchase request has been rejected and saved successfully.',
    '<div class="po-box">'
      +'<div class="po-row"><span class="po-label">Request</span><span class="po-value">'+po.title+'</span></div>'
      +'<div class="po-row"><span class="po-label">Requested By</span><span class="po-value">'+po.requester+'</span></div>'
      +'<div class="po-row"><span class="po-label">Total</span><span class="po-value">\u20b1'+(po.total||0).toLocaleString()+'</span></div>'
      +'<div class="po-row"><span class="po-label">Status</span><span class="po-value">'+badge+'</span></div>'
      +'</div>');
}

run();
</script>
</body>
</html>
